{% extends "base_public.html" %}
{% block title %}New password — FastPost{% endblock %}
{% block content %}
<div class="auth-wrap public-inner">
  {% include "partials/brand_mark.html" %}
  <div class="card auth-card">
    <h1>Choose a new password</h1>
    <form id="form" class="account-form">
      <input type="hidden" id="token" value="{{ token }}" />
      <div class="form-group">
        <label for="password">New password (8+ characters)</label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Update password</button>
    </form>
    <p id="err" class="form-error hidden"></p>
  </div>
</div>
<script>
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('err');
    err.classList.add('hidden');
    const token = document.getElementById('token').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      err.textContent = data.error || 'Reset failed';
      err.classList.remove('hidden');
      return;
    }
    window.location.href = '/dashboard';
  });
</script>
{% endblock %}
