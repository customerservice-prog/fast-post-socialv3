{% extends "base_public.html" %}
{% block title %}Log in — FastPost{% endblock %}
{% block content %}
<div class="auth-wrap public-inner">
  <div class="card auth-card">
    <h1>Log in</h1>
    <p class="muted"><a href="/register">Create an account</a> · <a href="/forgot-password">Forgot password?</a></p>
    <form id="loginForm" class="account-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>
    <p id="loginErr" class="form-error hidden"></p>
  </div>
</div>
<script>
  const nextUrl = {{ (next_url or '/dashboard')|tojson }};
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('loginErr');
    err.classList.add('hidden');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      err.textContent = data.error || 'Login failed';
      err.classList.remove('hidden');
      return;
    }
    window.location.href = nextUrl || '/dashboard';
  });
</script>
{% endblock %}
