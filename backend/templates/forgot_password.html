{% extends "base_public.html" %}
{% block title %}Forgot password — FastPost{% endblock %}
{% block content %}
<div class="auth-wrap public-inner">
  <div class="card auth-card">
    <h1>Reset password</h1>
    <p class="muted">We’ll email you a reset link when SMTP is configured on the server; otherwise check server logs (development).</p>
    <form id="form" class="account-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
    </form>
    <p id="msg" class="muted" style="margin-top:12px;"></p>
  </div>
</div>
<script>
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json().catch(() => ({}));
    document.getElementById('msg').textContent = data.message || 'Request received.';
  });
</script>
{% endblock %}
